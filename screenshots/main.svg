<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 720" width="390" height="720" font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7c66"/>
      <stop offset="1" stop-color="#0a5c4c"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7c66" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0e7c66" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0e7c66" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="390" height="720" fill="#f3f5f4"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="390" height="56" fill="#0e7c66"/>
  <text x="20" y="35" fill="#fff" font-size="19" font-weight="800">🏦 爸爸銀行</text>
  <rect x="244" y="18" width="64" height="21" rx="11" fill="#f0a202"/>
  <text x="276" y="33" fill="#3a2c00" font-size="11" font-weight="700" text-anchor="middle">雲端同步</text>
  <text x="324" y="35" font-size="15" text-anchor="middle">中</text>
  <text x="352" y="35" font-size="15" text-anchor="middle">🔓</text>
  <text x="375" y="35" font-size="15" text-anchor="middle">⚙️</text>

  <!-- Tabs -->
  <rect x="0" y="56" width="390" height="46" fill="#fff"/>
  <rect x="20" y="67" width="58" height="24" rx="12" fill="#0e7c66"/>
  <text x="49" y="83" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">小明</text>
  <rect x="86" y="67" width="120" height="24" rx="12" fill="#fff" stroke="#e4e9e7" stroke-dasharray="3 3"/>
  <text x="146" y="83" fill="#0e7c66" font-size="13" font-weight="600" text-anchor="middle">＋ 新增存款人</text>

  <!-- Balance card -->
  <rect x="14" y="116" width="362" height="220" rx="16" fill="url(#card)" filter="url(#sh)"/>
  <text x="195" y="150" fill="#fff" font-size="13" opacity="0.85" text-anchor="middle">目前餘額</text>
  <text x="195" y="196" fill="#fff" font-size="42" font-weight="800" text-anchor="middle">NT$565.00</text>
  <rect x="120" y="214" width="78" height="22" rx="11" fill="#ffffff" opacity="0.2"/>
  <text x="159" y="229" fill="#fff" font-size="12" text-anchor="middle">年息 12%</text>
  <rect x="206" y="214" width="118" height="22" rx="11" fill="#ffffff" opacity="0.14"/>
  <text x="265" y="229" fill="#fff" font-size="12" text-anchor="middle">下次配息 約 30 天後</text>

  <!-- Goal progress -->
  <text x="32" y="262" fill="#fff" font-size="12">🎯 目標：買樂高 NT$500.00</text>
  <text x="358" y="262" fill="#fff" font-size="12" opacity="0.95" text-anchor="end">🎉 已達成目標！</text>
  <rect x="32" y="270" width="326" height="10" rx="5" fill="#ffffff" opacity="0.22"/>
  <rect x="32" y="270" width="326" height="10" rx="5" fill="#ffe08a"/>

  <!-- Actions -->
  <rect x="32" y="294" width="158" height="30" rx="12" fill="#fff"/>
  <text x="111" y="314" fill="#0e7c66" font-size="15" font-weight="700" text-anchor="middle">＋ 存款</text>
  <rect x="200" y="294" width="158" height="30" rx="12" fill="#ffffff" opacity="0.2"/>
  <text x="279" y="314" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">－ 提款</text>

  <!-- Trend chart -->
  <text x="20" y="368" fill="#6b7c78" font-size="14" font-weight="600">每月餘額趨勢</text>
  <rect x="14" y="378" width="362" height="150" rx="16" fill="#fff"/>
  <path d="M40,500 L104,486 L168,452 L232,448 L296,430 L350,392 L350,500 L40,500 Z" fill="url(#chartFill)"/>
  <polyline points="40,500 104,486 168,452 232,448 296,430 350,392" fill="none" stroke="#0e7c66" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#fff" stroke="#0e7c66" stroke-width="2">
    <circle cx="40" cy="500" r="2.6"/><circle cx="104" cy="486" r="2.6"/><circle cx="168" cy="452" r="2.6"/>
    <circle cx="232" cy="448" r="2.6"/><circle cx="296" cy="430" r="2.6"/><circle cx="350" cy="392" r="2.6"/>
  </g>
  <text x="350" y="384" fill="#0e7c66" font-size="11" font-weight="700" text-anchor="end">565.00</text>
  <g fill="#6b7c78" font-size="9">
    <text x="40" y="520" text-anchor="start">2026/1</text>
    <text x="168" y="520" text-anchor="middle">2026/3</text>
    <text x="350" y="520" text-anchor="end">2026/6</text>
  </g>

  <!-- History -->
  <text x="20" y="558" fill="#6b7c78" font-size="14" font-weight="600">交易明細</text>
  <g>
    <rect x="14" y="568" width="362" height="58" rx="12" fill="#fff"/>
    <rect x="26" y="580" width="34" height="34" rx="9" fill="#fbf2dc"/>
    <text x="43" y="603" font-size="16" text-anchor="middle">✨</text>
    <text x="70" y="592" fill="#1c2b28" font-size="14" font-weight="600">利息</text>
    <text x="70" y="609" fill="#6b7c78" font-size="11">6/10 12:00</text>
    <text x="364" y="592" fill="#c98a00" font-size="15" font-weight="800" text-anchor="end">+2.05</text>
    <text x="364" y="609" fill="#6b7c78" font-size="11" text-anchor="end">餘 NT$565.00</text>
  </g>
  <g>
    <rect x="14" y="632" width="362" height="58" rx="12" fill="#fff"/>
    <rect x="26" y="644" width="34" height="34" rx="9" fill="#e3f4ec"/>
    <text x="43" y="667" font-size="16" text-anchor="middle">💰</text>
    <text x="70" y="656" fill="#1c2b28" font-size="14" font-weight="600">整理房間</text>
    <text x="70" y="673" fill="#6b7c78" font-size="11">6/2 12:00</text>
    <text x="364" y="656" fill="#1a9b6e" font-size="15" font-weight="800" text-anchor="end">+50.00</text>
    <text x="364" y="673" fill="#6b7c78" font-size="11" text-anchor="end">餘 NT$563.00</text>
  </g>
</svg>
